<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<title>Finew — UI Kit</title>
<meta name="viewport" content="width=1440">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" src="DesktopApp.jsx"></script>
<script type="text/babel" src="MobileApp.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  const { DesktopApp, MobileApp } = window;

  function Showcase() {
    const [density, setDensity] = useState("comfortable");
    const [desktopScreen, setDesktopScreen] = useState("overview");
    return (
      <div className="kit-stage">
        <header className="kit-header">
          <span className="fw-wordmark">Finew<span className="fw-wordmark-dot">.</span></span>
          <span className="t-caption">UI Kit · personal-finance PWA</span>
          <div className="kit-screen-picker">
            <span className="kit-screen-picker-label">Desktop:</span>
            {["overview", "transactions", "budgets", "cards", "goals"].map(s => (
              <button key={s} onClick={() => setDesktopScreen(s)} className={desktopScreen === s ? "is-active" : ""}>
                {{overview:"Visão geral", transactions:"Lançamentos", budgets:"Orçamentos", cards:"Cartões", goals:"Metas"}[s]}
              </button>
            ))}
          </div>
        </header>

        <div className="kit-row">
          <div className="kit-desktop-frame">
            <div className="kit-frame-label">Desktop · 1280</div>
            <div className="kit-desktop-bezel">
              <DesktopApp initialScreen={desktopScreen} density={density} onDensityChange={setDensity} key={desktopScreen} />
            </div>
          </div>

          <div className="kit-mobile-frame">
            <div className="kit-frame-label">Mobile · 390 (use bottom tabs)</div>
            <div className="kit-mobile-bezel">
              <MobileApp />
            </div>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Showcase />);
</script>
</body>
</html>
