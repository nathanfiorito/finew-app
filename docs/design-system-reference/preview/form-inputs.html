<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg-1); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
  label { display: block; font: 600 11px/1.2 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); margin-bottom: 6px; }
  .input {
    width: 100%; height: 36px; padding: 0 12px; box-sizing: border-box;
    background: var(--bg); color: var(--fg-1);
    border: 1px solid var(--border-2); border-radius: var(--radius-md);
    font: 400 14px/1 var(--font-sans);
  }
  .input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .input.error { border-color: var(--loss); }
  .hint { font: 400 11px/1.4 var(--font-sans); color: var(--fg-3); margin-top: 4px; }
  .err { color: var(--loss); }
  .row { display: flex; gap: 14px; align-items: center; margin-top: 4px; }
  .check, .radio { width: 16px; height: 16px; border: 1px solid var(--border-strong); border-radius: 4px; display: inline-block; vertical-align: middle; margin-right: 6px; background: var(--bg); }
  .check.on { background: var(--accent); border-color: var(--accent); position: relative; }
  .check.on::after { content: ''; position: absolute; left: 3px; top: 0px; width: 4px; height: 8px; border-right: 2px solid var(--accent-fg); border-bottom: 2px solid var(--accent-fg); transform: rotate(45deg); }
  .radio { border-radius: 50%; }
  .radio.on { border: 4px solid var(--accent); }
  .switch { width: 32px; height: 18px; background: var(--border-strong); border-radius: 999px; position: relative; display: inline-block; vertical-align: middle; margin-right: 6px; transition: background var(--duration-2); }
  .switch.on { background: var(--accent); }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: var(--bg); border-radius: 50%; transition: transform var(--duration-2); }
  .switch.on::after { transform: translateX(14px); }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <label>Descrição</label>
      <input class="input" value="Mercado Pão de Açúcar" />
    </div>
    <div>
      <label>Valor</label>
      <input class="input" value="R$ 482,30" style="font-variant-numeric: tabular-nums" />
    </div>
    <div>
      <label>Categoria</label>
      <input class="input error" value="" placeholder="Selecione" />
      <div class="hint err">Categoria é obrigatória.</div>
    </div>
    <div>
      <label>Conta</label>
      <input class="input" value="Itaú — Conta Corrente" />
      <div class="hint">Saldo: R$ 4.218,90</div>
    </div>
  </div>
  <div class="row" style="margin-top: 14px">
    <span><span class="check on"></span> Recorrente</span>
    <span><span class="radio on"></span> Receita</span>
    <span><span class="radio"></span> Despesa</span>
    <span><span class="switch on"></span> Notificações</span>
  </div>
</body>
</html>
