<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii & Borders</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg-1); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .demo { border: var(--hairline); background: var(--surface-1); height: 80px; display: flex; align-items: flex-end; padding: 8px 10px; }
  .demo > span { font: 600 10px/1.2 var(--font-sans); color: var(--fg-2); }
  .meta { margin-top: 6px; }
  .name { font: 600 11px/1.2 var(--font-sans); }
  .px   { font: 400 10px/1.3 var(--font-mono); color: var(--fg-3); margin-top: 1px; }
  h3 { font: 600 11px/1.2 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); margin: 0 0 10px 0; }
</style>
</head>
<body>
  <h3>Radii — medium values, no pills</h3>
  <div class="grid">
    <div><div class="demo" style="border-radius: 0"><span>0</span></div><div class="meta"><div class="name">radius-0</div><div class="px">tables · full-bleed</div></div></div>
    <div><div class="demo" style="border-radius: 6px"><span>6</span></div><div class="meta"><div class="name">radius-sm</div><div class="px">badges · chips</div></div></div>
    <div><div class="demo" style="border-radius: 8px"><span>8</span></div><div class="meta"><div class="name">radius-md</div><div class="px">inputs · buttons</div></div></div>
    <div><div class="demo" style="border-radius: 12px"><span>12</span></div><div class="meta"><div class="name">radius-lg</div><div class="px">cards · modals</div></div></div>
    <div><div class="demo" style="border-radius: 16px"><span>16</span></div><div class="meta"><div class="name">radius-xl</div><div class="px">large surfaces</div></div></div>
  </div>
</body>
</html>
