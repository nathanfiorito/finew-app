<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg-1); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; border: var(--hairline); border-radius: var(--radius-md); background: var(--surface-1); }
  .cell svg { color: var(--fg-1); }
  .cell .name { font: 500 10px/1.1 var(--font-sans); color: var(--fg-3); }
  h3 { font: 600 10px/1.2 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); margin: 0 0 8px 0; }
  .meta { margin-top: 12px; font: 400 11px/1.5 var(--font-sans); color: var(--fg-2); }
</style>
</head>
