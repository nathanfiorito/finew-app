<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg-1); }
  .row { display: grid; grid-template-columns: 64px 1fr 60px; gap: 12px; align-items: center; padding: 4px 0; }
  .name { font: 600 11px/1.2 var(--font-sans); }
  .px   { font: 400 11px/1.2 var(--font-mono); color: var(--fg-3); text-align: right; }
  .bar  { height: 14px; background: var(--accent); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><div class="name">space-1</div><div><div class="bar" style="width: 4px"></div></div><div class="px">4 px</div></div>
  <div class="row"><div class="name">space-2</div><div><div class="bar" style="width: 8px"></div></div><div class="px">8 px</div></div>
  <div class="row"><div class="name">space-3</div><div><div class="bar" style="width: 12px"></div></div><div class="px">12 px</div></div>
  <div class="row"><div class="name">space-4</div><div><div class="bar" style="width: 16px"></div></div><div class="px">16 px</div></div>
  <div class="row"><div class="name">space-5</div><div><div class="bar" style="width: 20px"></div></div><div class="px">20 px</div></div>
  <div class="row"><div class="name">space-6</div><div><div class="bar" style="width: 24px"></div></div><div class="px">24 px</div></div>
  <div class="row"><div class="name">space-7</div><div><div class="bar" style="width: 32px"></div></div><div class="px">32 px</div></div>
  <div class="row"><div class="name">space-8</div><div><div class="bar" style="width: 40px"></div></div><div class="px">40 px</div></div>
  <div class="row"><div class="name">space-9</div><div><div class="bar" style="width: 56px"></div></div><div class="px">56 px</div></div>
  <div class="row"><div class="name">space-10</div><div><div class="bar" style="width: 80px"></div></div><div class="px">80 px</div></div>
</body>
</html>
