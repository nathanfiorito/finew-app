<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Density · Comfortable vs Compact</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg-1); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel { padding: 16px; background: var(--surface-1); border: var(--hairline); border-radius: var(--radius-lg); }
  .micro { font: 600 10px/1.2 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; }
  td.amt, th.amt { text-align: right; font-variant-numeric: tabular-nums lining-nums; font-weight: 500; }
  th { font: 600 10px/1.2 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); border-bottom: var(--hairline); }

  /* Comfortable */
  .comfy th, .comfy td { padding: 10px 8px; font-size: 13px; }
  /* Compact */
  .cmp th, .cmp td { padding: 5px 8px; font-size: 12px; }
</style>
</head>
<body>
  <div class="panel">
    <div class="micro">Comfortable · default</div>
    <table class="comfy">
      <thead><tr><th>Categoria</th><th class="amt">Valor</th></tr></thead>
      <tbody>
        <tr><td>Mercado</td><td class="amt">1.482,30</td></tr>
        <tr><td>Restaurantes</td><td class="amt">892,15</td></tr>
        <tr><td>Transporte</td><td class="amt">340,00</td></tr>
        <tr><td>Assinaturas</td><td class="amt">149,80</td></tr>
      </tbody>
    </table>
  </div>
  <div class="panel">
    <div class="micro">Compact · planner</div>
    <table class="cmp">
      <thead><tr><th>Categoria</th><th class="amt">Valor</th></tr></thead>
      <tbody>
        <tr><td>Mercado</td><td class="amt">1.482,30</td></tr>
        <tr><td>Restaurantes</td><td class="amt">892,15</td></tr>
        <tr><td>Transporte</td><td class="amt">340,00</td></tr>
        <tr><td>Assinaturas</td><td class="amt">149,80</td></tr>
        <tr><td>Saúde</td><td class="amt">280,00</td></tr>
        <tr><td>Lazer</td><td class="amt">412,40</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
