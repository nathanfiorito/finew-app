<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg); color: var(--fg-1); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .card { background: var(--surface-1); border: var(--hairline); border-radius: var(--radius-lg); height: 80px; display: flex; align-items: center; justify-content: center; font: 600 11px/1.2 var(--font-sans); color: var(--fg-2); }
  .meta { margin-top: 10px; }
  .name { font: 600 11px/1.2 var(--font-sans); }
  .px   { font: 400 10px/1.3 var(--font-mono); color: var(--fg-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <div class="card" style="box-shadow: var(--shadow-sm)">sm</div>
      <div class="meta"><div class="name">shadow-sm</div><div class="px">subtle, hovered chips</div></div>
    </div>
    <div>
      <div class="card" style="box-shadow: var(--shadow-md)">md</div>
      <div class="meta"><div class="name">shadow-md</div><div class="px">popovers · tooltips</div></div>
    </div>
    <div>
      <div class="card" style="box-shadow: var(--shadow-lg)">lg</div>
      <div class="meta"><div class="name">shadow-lg</div><div class="px">modals · sheets</div></div>
    </div>
  </div>
</body>
</html>
