<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Money & Tabular Figures</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg-1); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { padding: 18px; background: var(--surface-1); border: var(--hairline); border-radius: var(--radius-lg); }
  .micro { font: 600 10px/1.2 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); margin-bottom: 8px; }
  .display { font-family: var(--font-serif); font-weight: 500; font-size: 36px; line-height: 1.1; font-variant-numeric: tabular-nums lining-nums; }
  .display .currency { font-size: 18px; color: var(--fg-3); margin-right: 6px; vertical-align: 0.2em; }
  .ui-money { font-family: var(--font-sans); font-weight: 600; font-variant-numeric: tabular-nums lining-nums; font-size: 17px; }
  .delta { font-family: var(--font-sans); font-weight: 500; font-variant-numeric: tabular-nums lining-nums; font-size: 13px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .gain { color: var(--gain); }
  .loss { color: var(--loss); }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-sans); font-size: 13px; }
  th, td { text-align: right; padding: 4px 0; font-variant-numeric: tabular-nums lining-nums; }
  th:first-child, td:first-child { text-align: left; color: var(--fg-2); }
  th { font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); border-bottom: var(--hairline); padding-bottom: 6px; }
  td { border-bottom: var(--hairline); padding: 6px 0; }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel">
      <div class="micro">Patrimônio total</div>
      <div class="display"><span class="currency">R$</span>184.290<span style="color: var(--fg-3)">,47</span></div>
      <div class="delta gain">▲ +R$ 2.140,00 · +1,18% · 30 d</div>
    </div>
    <div class="panel">
      <div class="micro">Lançamentos do mês</div>
      <table>
        <thead><tr><th>Categoria</th><th>Valor</th></tr></thead>
        <tbody>
          <tr><td>Mercado</td><td>1.482,30</td></tr>
          <tr><td>Restaurantes</td><td>892,15</td></tr>
          <tr><td>Transporte</td><td>340,00</td></tr>
          <tr><td>Assinaturas</td><td>149,80</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
