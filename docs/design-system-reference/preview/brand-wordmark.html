<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand — Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); color: var(--fg-1); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .panel { padding: 24px; border: var(--hairline); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; min-height: 100px; }
  .light { background: var(--bg); }
  .moss  { background: var(--accent); }
  .dark  { background: #14110E; }
  .wordmark { font-family: var(--font-serif); font-weight: 600; font-size: 36px; letter-spacing: -0.01em; }
  .wordmark .dot { color: var(--accent); }
  .meta { margin-top: 8px; font: 400 11px/1.4 var(--font-sans); color: var(--fg-3); }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <div class="panel light"><span class="wordmark">Finew<span class="dot">.</span></span></div>
      <div class="meta">Light surface — graphite + moss accent</div>
    </div>
    <div>
      <div class="panel moss"><span class="wordmark" style="color: #FAF8F4">Finew<span style="color: #14110E">.</span></span></div>
      <div class="meta">Moss surface — beige type</div>
    </div>
    <div>
      <div class="panel dark"><span class="wordmark" style="color: #EFE9DD">Finew<span style="color: #7FA487">.</span></span></div>
      <div class="meta">Dark — bone + lifted moss</div>
    </div>
  </div>
</body>
</html>
